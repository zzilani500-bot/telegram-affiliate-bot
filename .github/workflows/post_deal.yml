name: Post Affiliate Deal

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  post-deal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Post deal to Telegram
        run: python post_once.py
